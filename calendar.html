<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBSTU Calendar</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="icon.png">
<script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@600;700&display=swap');
  :root { --bg: #0f172a; --surface: #1e293b; --card: #0b1121; --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-green: #10b981; --accent-red: #ef4444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 30px 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 24px; }
  h1 { font-size: 2rem; }
  .nav-btn { display: inline-flex; padding: 6px 12px; background: rgba(59,130,246,0.15); color: var(--accent-blue); border-radius: 8px; text-decoration: none; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
  .month { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .m-head { text-align: center; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 4px; }
  .d-name { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
  .d-cell { padding: 8px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; border-radius: 6px; }
  .off { color: var(--accent-red); }
  .hol { background: rgba(239,68,68,0.15); color: var(--accent-red); cursor: help; border: 1px solid rgba(239,68,68,0.3); }
  .today { background: var(--accent-green); color: #000; font-weight: 800; transform: scale(1.1); box-shadow: 0 0 10px rgba(16,185,129,0.5); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div><a href="index.html" class="nav-btn">← Back to Routine</a><h1>MBSTU 2026</h1></div>
    <div id="next-hol" style="text-align:right; color:var(--accent-red); font-weight:700;">Loading...</div>
  </header>
  <div class="grid" id="cal"></div>
</div>
<script>
const hols = [
  {m:0,d:17,n:"Shab-e-Meraj"}, {m:0,d:23,n:"Saraswati Puja"}, {m:1,d:4,n:"Shab-e-Barat"}, {m:1,d:21,n:"Mother Language Day"},
  ...Array.from({length:14},(_,i)=>({m:2,d:12+i,n:"Eid-ul-Fitr Vacation"})), {m:2,d:26,n:"Independence Day"},
  {m:3,d:5,n:"Easter"}, {m:3,d:14,n:"Nabobarsho"}, {m:4,d:1,n:"May Day"},
  ...Array.from({length:11},(_,i)=>({m:4,d:21+i,n:"Summer Vacation"})), ...Array.from({length:6},(_,i)=>({m:5,d:1+i,n:"Summer Vacation"})),
  {m:6,d:15,n:"Mourning Day"}, {m:7,d:26,n:"Janmashtami"}, {m:8,d:28,n:"Eid-e-Miladunnabi"},
  ...Array.from({length:4},(_,i)=>({m:9,d:18+i,n:"Durga Puja"})), {m:11,d:16,n:"Victory Day"},
  ...Array.from({length:11},(_,i)=>({m:11,d:21+i,n:"Winter Vacation"}))
];
const mNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Dhaka"}));

for(let m=0; m<12; m++) {
  const card = document.createElement('div'); card.className = 'month';
  card.innerHTML = `<div class="m-head">${mNames[m]}</div><div class="days" id="d-${m}"></div>`;
  document.getElementById('cal').appendChild(card);
  const grid = document.getElementById(`d-${m}`);
  ["S","S","M","T","W","T","F"].forEach((n,i)=>grid.innerHTML+=`<div class="d-name ${i>4?'off':''}">${n}</div>`);
  const start = (new Date(2026, m, 1).getDay()+1)%7;
  for(let i=0; i<start; i++) grid.innerHTML+=`<div></div>`;
  const days = new Date(2026, m+1, 0).getDate();
  for(let d=1; d<=days; d++) {
    const idx = (start+d-1)%7;
    const h = hols.find(x=>x.m===m&&x.d===d);
    let cls = `d-cell ${idx>4?'off':''}`;
    if(h) cls += ' hol';
    if(now.getFullYear()===2026&&now.getMonth()===m&&now.getDate()===d) cls += ' today';
    grid.innerHTML+=`<div class="${cls}" title="${h?h.n:''}">${d}</div>`;
  }
}
</script>
</body>
</html>
