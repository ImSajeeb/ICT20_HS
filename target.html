<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target Grade Forecaster</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="icon.png">
<script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --card: #0b1121;
    --card-hover: #162032;
    --border: #334155;
    
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-green: #10b981;
    --accent-orange: #f59e0b;
    --accent-red: #ef4444;
    --accent-teal: #06b6d4;
    
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 30px 20px 60px;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    top: -250px; left: -250px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: -1;
  }

  .container { max-width: 600px; margin: 0 auto; position: relative; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .title-block h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  .title-block p { font-size: 0.85rem; color: var(--accent-orange); font-weight: 600; margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

  .nav-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(59, 130, 246, 0.15); color: var(--accent-blue);
    border: 1px solid rgba(59, 130, 246, 0.3); padding: 6px 14px;
    border-radius: 8px; font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; text-decoration: none;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--accent-blue); color: #fff; transform: translateY(-2px); }

  /* CALCULATOR CARD */
  .calc-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    margin-bottom: 24px;
  }

  .input-group { margin-bottom: 20px; }
  .input-group label {
    display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .input-group label span { color: var(--accent-teal); }
  
  .input-row { display: flex; gap: 16px; margin-bottom: 20px; }
  .input-row > div { flex: 1; margin-bottom: 0; }

  input[type="number"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: #fff; padding: 12px 16px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus { outline: none; border-color: var(--accent-orange); }

  .total-internal-badge {
    text-align: center; background: rgba(16, 185, 129, 0.1); border: 1px dashed var(--accent-green);
    color: var(--accent-green); padding: 12px; border-radius: 8px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; font-size: 1rem;
  }

  /* RESULTS GRID */
  .results-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; display: flex; justify-content: space-between;
    align-items: center; transition: all 0.2s;
  }

  .grade-badge { font-size: 1.2rem; font-weight: 800; font-family: 'Inter', sans-serif; }
  .target-score { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; }

  /* Status Colors */
  .c-aplus { color: var(--accent-blue); }
  .c-a { color: var(--accent-teal); }
  .c-aminus { color: var(--accent-green); }
  .c-bplus { color: #84cc16; } /* Lime */
  .c-b { color: var(--accent-orange); }
  .c-pass { color: var(--text-muted); }

  .status-impossible { color: var(--accent-red); font-size: 0.85rem; font-weight: 700; text-align: right; }
  .status-secured { color: var(--accent-green); font-size: 0.85rem; font-weight: 700; }

  /* FOOTER */
  .credit-wrapper { display: flex; justify-content: center; margin-top: 40px; padding-bottom: 20px; }
  .credit-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 12px 24px; display: flex; align-items: center; gap: 14px; font-size: 0.8rem; color: var(--text-muted); font-weight: 500; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .credit-pill span.name { font-weight: 700; letter-spacing: 0.5px; color: var(--accent-blue); }
  .credit-divider { height: 16px; width: 1px; background: var(--border); }

  @media (max-width: 650px) {
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .results-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <a href="index.html" class="nav-btn">← Back to Routine</a>
      <h1>Finals Target</h1>
      <p>Grade Forecaster (60 Marks)</p>
    </div>
  </header>

  <div class="calc-card">
    <div class="input-row">
      <div class="input-group">
        <label>Attendance <span>Max: 10</span></label>
        <input type="number" id="att-score" value="8" min="0" max="10" oninput="calculateTargets()">
      </div>
      <div class="input-group">
        <label>Class Tests <span>Max: 30</span></label>
        <input type="number" id="ct-score" value="22" min="0" max="30" oninput="calculateTargets()">
      </div>
    </div>
    <div class="total-internal-badge" id="internal-display">
      Total Internal: 30 / 40
    </div>
  </div>

  <div class="results-grid" id="results-container">
    </div>

  <div class="credit-wrapper">
    <div class="credit-pill">
      <div>Crafted by <span class="name">Sajeeb Khan</span></div>
      <div class="credit-divider"></div>
      <div>Designed for MBSTU</div>
    </div>
  </div>

</div>

<script>
// MBSTU Standard Grading Scale (Out of 100)
const GRADES = [
  { name: 'A+', min: 80, class: 'c-aplus' },
  { name: 'A',  min: 75, class: 'c-a' },
  { name: 'A-', min: 70, class: 'c-aminus' },
  { name: 'B+', min: 65, class: 'c-bplus' },
  { name: 'B',  min: 60, class: 'c-b' },
  { name: 'Pass', min: 40, class: 'c-pass' }
];

function calculateTargets() {
  let attScore = parseFloat(document.getElementById('att-score').value) || 0;
  let ctScore = parseFloat(document.getElementById('ct-score').value) || 0;
  
  // Cap inputs to maximums just in case
  if(attScore > 10) attScore = 10;
  if(ctScore > 30) ctScore = 30;

  const internalScore = attScore + ctScore;
  const finalTotal = 60; // Final exam is fixed at 60 marks
  
  // Update UI Display for Internal Marks
  document.getElementById('internal-display').textContent = `Total Internal: ${internalScore} / 40`;

  const resultsContainer = document.getElementById('results-container');
  resultsContainer.innerHTML = '';

  GRADES.forEach(grade => {
    // Math: Target Out of 100 minus what they already have = What they need on the 60 mark final
    let neededInFinal = Math.ceil(grade.min - internalScore);
    
    let displayHtml = '';
    
    if (neededInFinal > finalTotal) {
      displayHtml = `<span class="status-impossible">Impossible ❌</span>`;
    } else if (neededInFinal <= 0) {
      displayHtml = `<span class="status-secured">Secured ✅</span>`;
    } else {
      displayHtml = `<span class="target-score">${neededInFinal} <span style="font-size:0.75rem; color:var(--text-muted)">/ ${finalTotal}</span></span>`;
    }

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="grade-badge ${grade.class}">${grade.name}</div>
      <div>${displayHtml}</div>
    `;
    
    resultsContainer.appendChild(card);
  });
}

// Run once on load to show default values
calculateTargets();
</script>
</body>
</html>
